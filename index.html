<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة المواقع الاستثمارية بالمدينة المنورة — الخريطة</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
  <!-- الخطوط والأيقونات -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- الشريط العلوي -->
  <header class="app-header">
    <div class="logo"><i class="fa-solid fa-map-location-dot"></i> <span>منصة المواقع الاستثمارية بالمدينة المنورة</span></div>
    <nav>
      <a href="index.html" class="active"><i class="fa-solid fa-map"></i> الخريطة</a>
      <a href="analysis.html"><i class="fa-solid fa-route"></i> تحليل الموقع</a>
      <a href="landmarks.html"><i class="fa-solid fa-location-dot"></i> إدارة المعالم</a>
    </nav>
    <div class="header-actions">
      <button class="header-btn primary" id="btnUpload"><i class="fa-solid fa-file-import"></i> <span>رفع KML/KMZ</span></button>
      <input type="file" id="fileInput" accept=".kml,.kmz,.geojson,.json" multiple hidden />
      <button class="header-btn" id="btnSaveAll" title="حفظ جميع التعديلات (المعالم والنظام والبيانات الأساسية)"><i class="fa-solid fa-floppy-disk"></i> <span>حفظ الكل</span></button>
      <button class="header-btn" id="btnBackup" title="النسخ الاحتياطي والإعدادات"><i class="fa-solid fa-gear"></i></button>
      <button class="header-btn" id="btnTheme" title="الوضع الليلي/النهاري"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <div class="app-body">
    <!-- الخريطة -->
    <div class="map-wrap">
      <div id="map"></div>

      <!-- البحث الجغرافي -->
      <div class="map-search">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="ابحث عن موقع أو عنوان..." />
          <button id="btnSearch"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>

      <!-- أدوات الخريطة -->
      <div class="map-tools" id="mapTools">
        <button class="map-tool-btn" data-tool="fullscreen"><i class="fa-solid fa-expand"></i><span class="tooltip">ملء الشاشة</span></button>
        <button class="map-tool-btn" data-tool="locate"><i class="fa-solid fa-location-crosshairs"></i><span class="tooltip">موقعي الحالي</span></button>
        <button class="map-tool-btn" data-tool="fitAll"><i class="fa-solid fa-maximize"></i><span class="tooltip">تكبير جميع الأراضي</span></button>
        <button class="map-tool-btn" data-tool="basemap"><i class="fa-solid fa-layer-group"></i><span class="tooltip">نوع الخريطة</span></button>
        <button class="map-tool-btn" data-tool="landmarks"><i class="fa-solid fa-location-dot"></i><span class="tooltip">إظهار/إخفاء المعالم</span></button>
        <button class="map-tool-btn" data-tool="measureDist"><i class="fa-solid fa-ruler"></i><span class="tooltip">قياس مسافة</span></button>
        <button class="map-tool-btn" data-tool="measureArea"><i class="fa-solid fa-ruler-combined"></i><span class="tooltip">قياس مساحة</span></button>
        <button class="map-tool-btn" data-tool="drawPoint"><i class="fa-solid fa-circle-dot"></i><span class="tooltip">رسم نقطة</span></button>
        <button class="map-tool-btn" data-tool="drawLine"><i class="fa-solid fa-slash"></i><span class="tooltip">رسم خط</span></button>
        <button class="map-tool-btn" data-tool="drawPolygon"><i class="fa-solid fa-draw-polygon"></i><span class="tooltip">رسم مضلع</span></button>
        <button class="map-tool-btn" data-tool="clearDraw"><i class="fa-solid fa-eraser"></i><span class="tooltip">مسح الرسومات</span></button>
        <button class="map-tool-btn" data-tool="multiSelect"><i class="fa-solid fa-object-group"></i><span class="tooltip">تحديد متعدد</span></button>
        <button class="map-tool-btn" data-tool="screenshot"><i class="fa-solid fa-camera"></i><span class="tooltip">التقاط صورة</span></button>
        <button class="map-tool-btn" data-tool="print"><i class="fa-solid fa-print"></i><span class="tooltip">طباعة الخريطة</span></button>
      </div>

      <!-- قائمة خرائط الأساس -->
      <div class="basemap-menu" id="basemapMenu"></div>

      <!-- مفتاح الخريطة -->
      <div class="map-legend" id="mapLegend"></div>

      <!-- شريط التحديد المتعدد -->
      <div class="multi-bar" id="multiBar">
        <span>محدد: <b id="multiCount">0</b></span>
        <button class="btn sm primary" id="btnMultiCopy"><i class="fa-solid fa-copy"></i> نسخ إلى قسم</button>
        <button class="btn sm" id="btnMultiExport"><i class="fa-solid fa-file-excel"></i> تصدير</button>
        <button class="btn sm" id="btnMultiPrint"><i class="fa-solid fa-print"></i> طباعة PDF</button>
        <button class="btn sm" id="btnMultiClear"><i class="fa-solid fa-xmark"></i> مسح</button>
      </div>

      <!-- لوحة تفاصيل الأرض -->
      <aside class="detail-drawer" id="detailDrawer">
        <div class="drawer-head">
          <i class="fa-solid fa-vector-square"></i>
          <div class="title" id="drawerTitle">تفاصيل الأرض</div>
          <button class="icon-btn" id="btnCloseDrawer"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
        <div class="drawer-actions" id="drawerActions"></div>
      </aside>
    </div>

    <!-- الشريط الجانبي -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="active" data-pane="dashboard"><i class="fa-solid fa-chart-pie"></i> اللوحة</button>
        <button data-pane="filters"><i class="fa-solid fa-filter"></i> الفلاتر</button>
        <button data-pane="sections"><i class="fa-solid fa-folder-open"></i> الأقسام</button>
        <button data-pane="lands"><i class="fa-solid fa-list"></i> الأراضي</button>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-pane active" id="pane-dashboard"></div>
        <div class="sidebar-pane" id="pane-filters"></div>
        <div class="sidebar-pane" id="pane-sections"></div>
        <div class="sidebar-pane" id="pane-lands"></div>
      </div>
    </aside>
    <button class="sidebar-toggle shifted" id="sidebarToggle"><i class="fa-solid fa-chevron-right"></i></button>
  </div>

  <!-- نافذة منبثقة عامة -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBox">
      <div class="modal-head" id="modalHead"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- التنبيهات وشريط التقدم -->
  <div class="toast-wrap" id="toastWrap"></div>
  <div class="progress-overlay" id="progressOverlay">
    <i class="fa-solid fa-map-location-dot fa-2x fa-beat-fade"></i>
    <div id="progressText">جارٍ المعالجة...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <!-- المكتبات -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet-simple-map-screenshoter@0.4.5/dist/leaflet-simple-map-screenshoter.js"></script>

  <!-- البيانات المدمجة (أراضي أمانة المدينة المنورة) -->
  <script src="data/lands-data.js"></script>

  <!-- وحدات التطبيق -->
  <script src="js/storage.js"></script>
  <script src="js/kml-parser.js"></script>
  <script src="js/distance-analysis.js"></script>
  <script src="js/landmarks.js"></script>
  <script src="js/export.js"></script>
  <script src="js/land-manager.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui-common.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
