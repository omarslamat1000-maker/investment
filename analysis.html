<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحليل الموقع والمسافات — منصة المواقع الاستثمارية بالمدينة المنورة</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📏</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo"><i class="fa-solid fa-map-location-dot"></i> <span>منصة المواقع الاستثمارية بالمدينة المنورة</span></div>
    <nav>
      <a href="index.html"><i class="fa-solid fa-map"></i> الخريطة</a>
      <a href="analysis.html" class="active"><i class="fa-solid fa-route"></i> تحليل الموقع</a>
      <a href="landmarks.html"><i class="fa-solid fa-location-dot"></i> إدارة المعالم</a>
    </nav>
    <div class="header-actions">
      <button class="header-btn" id="btnSaveAll" title="حفظ جميع التعديلات (المعالم والنظام والبيانات الأساسية)"><i class="fa-solid fa-floppy-disk"></i> <span>حفظ الكل</span></button>
      <button class="header-btn" id="btnTheme" title="الوضع الليلي/النهاري"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <div class="page-layout">
    <!-- لوحة التحليل -->
    <aside class="page-panel">
      <h3><i class="fa-solid fa-route"></i> تحليل الموقع والمسافات</h3>

      <div class="panel-section">
        <h4><i class="fa-solid fa-location-crosshairs"></i> 1) حدد الموقع</h4>
        <div class="btn-group" style="margin-bottom:10px">
          <button class="btn sm" id="btnPickMap"><i class="fa-solid fa-hand-pointer"></i> نقر على الخريطة</button>
          <button class="btn sm" id="btnPickLand"><i class="fa-solid fa-vector-square"></i> اختيار قطعة أرض</button>
        </div>
        <div class="field"><label>اختر قطعة من القائمة</label>
          <select id="landSelect"><option value="">— اختر قطعة أرض —</option></select>
        </div>
        <div class="field"><label>أو ابحث عن موقع/عنوان</label>
          <div style="display:flex;gap:6px">
            <input type="text" id="searchPlace" placeholder="مثال: حي العزيزية..." style="flex:1">
            <button class="btn sm primary" id="btnSearchPlace"><i class="fa-solid fa-magnifying-glass"></i></button>
          </div>
          <div class="search-results" id="placeResults" style="position:relative"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>خط العرض</label><input type="number" id="inpLat" step="0.000001" placeholder="24.4672" style="direction:ltr"></div>
          <div class="field"><label>خط الطول</label><input type="number" id="inpLng" step="0.000001" placeholder="39.6111" style="direction:ltr"></div>
        </div>
        <button class="btn primary block" id="btnAnalyzeCoords"><i class="fa-solid fa-calculator"></i> تحليل الإحداثيات المدخلة</button>
      </div>

      <div class="panel-section">
        <h4><i class="fa-solid fa-filter"></i> 2) خيارات التحليل</h4>
        <div class="field"><label>تصفية حسب نوع المعلم</label>
          <div class="chip-row" id="catChips"></div>
        </div>
        <div class="field" style="margin-top:8px"><label>عدد المعالم في جدول النتائج</label>
          <input type="number" id="resLimit" min="1" step="1" placeholder="الكل (بدون حد)" style="direction:ltr">
        </div>
        <label class="checkbox-line"><input type="checkbox" id="chkNearestPerCat"> عرض أقرب معلم من كل فئة فقط</label>
        <label class="checkbox-line"><input type="checkbox" id="chkRouting"> حساب مسافة الطريق وزمن الوصول (يتطلب إنترنت)</label>
      </div>

      <div class="panel-section" id="resultsSection" style="display:none">
        <h4><i class="fa-solid fa-table-list"></i> 3) النتائج <span id="resultsPoint" style="font-weight:400;font-size:11px;color:var(--text-2)"></span></h4>
        <div style="max-height:400px;overflow-y:auto">
          <table class="data-table" id="resultsTable">
            <thead><tr><th>المعلم</th><th>النوع</th><th>المسافة</th><th>الاتجاه</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="btn-group" style="margin-top:12px">
          <button class="btn sm primary" id="btnExportExcel"><i class="fa-solid fa-file-excel"></i> تصدير Excel</button>
          <button class="btn sm" id="btnExportPDF"><i class="fa-solid fa-file-pdf"></i> تقرير PDF / طباعة</button>
          <button class="btn sm" id="btnSaveAnalysis" style="display:none"><i class="fa-solid fa-floppy-disk"></i> حفظ ضمن بيانات الأرض</button>
        </div>
        <div class="btn-group" style="margin-top:8px">
          <button class="btn sm" id="btnAddToPrintList"><i class="fa-solid fa-plus"></i> إضافة الموقع إلى قائمة الطباعة</button>
        </div>
      </div>

      <!-- قائمة طباعة عدة مواقع في ملف PDF واحد -->
      <div class="panel-section" id="printListSection" style="display:none">
        <h4><i class="fa-solid fa-print"></i> 4) قائمة الطباعة <span id="printListCount" style="color:var(--text-2);font-weight:400"></span></h4>
        <div id="printListItems"></div>
        <div class="btn-group" style="margin-top:10px">
          <button class="btn sm primary" id="btnPrintAll"><i class="fa-solid fa-file-pdf"></i> طباعة الكل في ملف واحد</button>
          <button class="btn sm" id="btnClearPrintList"><i class="fa-solid fa-eraser"></i> مسح القائمة</button>
        </div>
      </div>
    </aside>

    <!-- الخريطة -->
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-legend" id="mapLegend" style="display:none"></div>
      <!-- تصدير الخريطة كصورة PNG -->
      <button class="btn sm" id="btnMapImage" title="تصدير الخريطة كصورة"
        style="position:absolute;top:12px;left:12px;z-index:1000;box-shadow:var(--shadow)">
        <i class="fa-solid fa-camera"></i> تصدير صورة
      </button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBox">
      <div class="modal-head" id="modalHead"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>
  <div class="toast-wrap" id="toastWrap"></div>
  <div class="progress-overlay" id="progressOverlay">
    <i class="fa-solid fa-map-location-dot fa-2x fa-beat-fade"></i>
    <div id="progressText">جارٍ المعالجة...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="data/lands-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/kml-parser.js"></script>
  <script src="js/distance-analysis.js"></script>
  <script src="js/landmarks.js"></script>
  <script src="js/export.js"></script>
  <script src="js/land-manager.js"></script>
  <script src="https://unpkg.com/leaflet-simple-map-screenshoter@0.4.5/dist/leaflet-simple-map-screenshoter.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui-common.js"></script>
  <script src="js/analysis-page.js"></script>
</body>
</html>
