<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة المعالم — منصة المواقع الاستثمارية بالمدينة المنورة</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo"><i class="fa-solid fa-map-location-dot"></i> <span>منصة المواقع الاستثمارية بالمدينة المنورة</span></div>
    <nav>
      <a href="index.html"><i class="fa-solid fa-map"></i> الخريطة</a>
      <a href="analysis.html"><i class="fa-solid fa-route"></i> تحليل الموقع</a>
      <a href="landmarks.html" class="active"><i class="fa-solid fa-location-dot"></i> إدارة المعالم</a>
    </nav>
    <div class="header-actions">
      <button class="header-btn" id="btnSaveAll" title="حفظ جميع التعديلات (المعالم والنظام والبيانات الأساسية)"><i class="fa-solid fa-floppy-disk"></i> <span>حفظ الكل</span></button>
      <button class="header-btn" id="btnTheme" title="الوضع الليلي/النهاري"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <div class="page-layout">
    <aside class="page-panel">
      <h3><i class="fa-solid fa-location-dot"></i> إدارة المعالم</h3>

      <div class="panel-section">
        <button class="btn primary block" id="btnAddByClick"><i class="fa-solid fa-map-pin"></i> إضافة معلم بالنقر على الخريطة</button>
        <p style="font-size:11.5px;color:var(--text-2);margin-top:8px">اضغط الزر ثم انقر على الموقع المطلوب في الخريطة، وستظهر نافذة لإدخال بيانات المعلم.</p>
        <div class="btn-group" style="margin-top:10px">
          <button class="btn sm" id="btnImportLm"><i class="fa-solid fa-file-import"></i> استيراد (KML/KMZ/Excel/GeoJSON)</button>
          <input type="file" id="lmFileInput" accept=".kml,.kmz,.xlsx,.xls,.csv,.geojson,.json" multiple hidden />
          <button class="btn sm" id="btnExportLmExcel"><i class="fa-solid fa-file-excel"></i> تصدير Excel</button>
          <button class="btn sm" id="btnExportLmGeo"><i class="fa-solid fa-code"></i> تصدير GeoJSON</button>
        </div>
      </div>

      <div class="panel-section">
        <h4><i class="fa-solid fa-chart-pie"></i> تحليل المعالم</h4>
        <div id="lmStats"></div>
      </div>

      <div class="panel-section">
        <h4><i class="fa-solid fa-filter"></i> تصفية حسب الفئة</h4>
        <div class="chip-row" id="lmCatChips"></div>
        <label class="checkbox-line" style="margin-top:8px"><input type="checkbox" id="chkDraggable"> تفعيل تعديل الموقع بالسحب على الخريطة</label>
      </div>

      <div class="panel-section">
        <h4><i class="fa-solid fa-list"></i> قائمة المعالم <span id="lmCount" style="color:var(--text-2);font-weight:400"></span></h4>
        <div class="field"><input type="text" id="lmSearch" placeholder="بحث في المعالم..."></div>
        <div id="lmList" style="max-height:480px;overflow-y:auto"></div>
      </div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBox">
      <div class="modal-head" id="modalHead"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>
  <div class="toast-wrap" id="toastWrap"></div>
  <div class="progress-overlay" id="progressOverlay">
    <i class="fa-solid fa-map-location-dot fa-2x fa-beat-fade"></i>
    <div id="progressText">جارٍ المعالجة...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="data/lands-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/kml-parser.js"></script>
  <script src="js/distance-analysis.js"></script>
  <script src="js/landmarks.js"></script>
  <script src="js/export.js"></script>
  <script src="js/land-manager.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui-common.js"></script>
  <script src="js/landmarks-page.js"></script>
</body>
</html>
